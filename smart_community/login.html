<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Smart Community</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Sarabun:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Sarabun', 'Plus Jakarta Sans', sans-serif;
        }
    </style>
</head>

<body class="h-screen w-full bg-slate-900 relative flex items-center justify-center overflow-hidden">

    <div class="absolute inset-0 z-0">
        <div
            class="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] bg-indigo-500/30 rounded-full blur-[100px] animate-pulse">
        </div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] bg-violet-500/30 rounded-full blur-[100px] animate-pulse"
            style="animation-delay: 2s"></div>
        <div class="absolute inset-0 bg-[url('https://grainy-gradients.vercel.app/noise.svg')] opacity-20"></div>
    </div>

    <div class="relative z-10 w-full max-w-md p-6">
        <div
            class="bg-white/10 backdrop-blur-2xl border border-white/10 p-10 rounded-[2.5rem] shadow-2xl shadow-indigo-500/20">
            <div class="text-center mb-10">
                <div
                    class="w-20 h-20 bg-gradient-to-tr from-indigo-500 to-violet-500 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-lg shadow-indigo-500/30">
                    <i data-lucide="radio-receiver" class="text-white w-10 h-10"></i>
                </div>
                <h1 class="text-3xl font-extrabold text-white tracking-tight">LoRa Admin</h1>
                <p class="text-indigo-200 mt-2 font-medium">Smart Village System</p>
            </div>

            <form onsubmit="handleLogin(event)" class="space-y-6">
                <div>
                    <label
                        class="block text-xs font-bold text-indigo-200 uppercase tracking-widest mb-2 ml-1">Username</label>
                    <div class="relative group">
                        <i data-lucide="user"
                            class="absolute left-4 top-1/2 -translate-y-1/2 h-5 w-5 text-indigo-300 group-focus-within:text-white transition-colors"></i>
                        <input type="text" id="username"
                            class="block w-full pl-12 pr-4 py-4 bg-slate-800/50 border border-slate-700/50 rounded-2xl text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-slate-800 transition-all"
                            placeholder="Enter username">
                    </div>
                </div>

                <div>
                    <label
                        class="block text-xs font-bold text-indigo-200 uppercase tracking-widest mb-2 ml-1">Password</label>
                    <div class="relative group">
                        <i data-lucide="lock"
                            class="absolute left-4 top-1/2 -translate-y-1/2 h-5 w-5 text-indigo-300 group-focus-within:text-white transition-colors"></i>
                        <input type="password" id="password"
                            class="block w-full pl-12 pr-4 py-4 bg-slate-800/50 border border-slate-700/50 rounded-2xl text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-slate-800 transition-all"
                            placeholder="••••••••">
                    </div>
                </div>

                <button type="submit"
                    class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-4 rounded-2xl shadow-lg shadow-indigo-600/30 transform transition hover:-translate-y-1 active:translate-y-0 flex items-center justify-center gap-2 mt-6">
                    <span>เข้าสู่ระบบ</span>
                    <i data-lucide="arrow-right" class="w-5 h-5"></i>
                </button>
            </form>

            <div class="mt-8 text-center">
                <a href="register.html" class="text-sm text-slate-400 hover:text-white transition-colors">ยังไม่มีบัญชี?
                    สมัครสมาชิก</a>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        async function handleLogin(e) {
            e.preventDefault();
            const user = document.getElementById('username').value; const pass = document.getElementById('password').value;
            try { const res = await fetch('api/login.php', { method: 'POST', body: JSON.stringify({ username: user, password: pass }) }); const d = await res.json(); if (d.status === 'success') window.location.href = 'index.html'; else alert(d.message); } catch (e) { alert('Connection Error'); }
        }
    </script>
</body>

</html>
