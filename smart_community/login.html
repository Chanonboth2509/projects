<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - LoRa Smart Village</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { 
            font-family: 'Sarabun', 'Plus Jakarta Sans', sans-serif; 
            background-color: #F8FAFC; /* เปลี่ยนสีพื้นหลังเป็นสว่าง */
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.7); /* ปรับกระจกเป็นสีขาวขุ่น */
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08); /* ปรับเงาให้อ่อนลง */
        }
        .input-group {
            transition: all 0.3s ease;
        }
        .input-group:focus-within {
            background: rgba(255, 255, 255, 1);
            border-color: rgba(99, 102, 241, 0.5);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }
        .floating-orb {
            animation: float 15s infinite alternate ease-in-out;
        }
        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(30px, -50px) scale(1.1); }
            100% { transform: translate(-20px, 20px) scale(0.9); }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center relative overflow-hidden text-slate-800 selection:bg-indigo-500/30">

    <div class="absolute inset-0 z-0 overflow-hidden pointer-events-none">
        <div class="absolute top-[-10%] left-[-10%] w-[50vw] h-[50vw] rounded-full bg-indigo-500/20 blur-[100px] floating-orb"></div>
        <div class="absolute bottom-[-20%] right-[-10%] w-[60vw] h-[60vw] rounded-full bg-violet-500/20 blur-[120px] floating-orb" style="animation-delay: -5s;"></div>
        <div class="absolute inset-0 bg-[url('https://grainy-gradients.vercel.app/noise.svg')] opacity-5 mix-blend-overlay"></div>
    </div>

    <div class="relative z-10 w-full max-w-md p-6">
        <div class="glass-card rounded-[2.5rem] p-10 relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-[1px] bg-gradient-to-r from-transparent via-indigo-200 to-transparent"></div>

            <div class="text-center mb-10">
                <div class="w-20 h-20 mx-auto bg-gradient-to-br from-indigo-500 to-violet-600 rounded-2xl flex items-center justify-center shadow-[0_10px_30px_rgba(99,102,241,0.3)] mb-6 transform hover:scale-105 transition-transform duration-300">
                    <i data-lucide="radio-tower" class="text-white w-10 h-10"></i>
                </div>
                <h1 class="text-3xl font-extrabold text-slate-800 tracking-tight font-['Plus_Jakarta_Sans']">
                    LoRa<span class="text-transparent bg-clip-text bg-gradient-to-r from-indigo-500 to-violet-500">Hub</span>
                </h1>
                <p class="text-slate-500 mt-2 text-xs font-bold tracking-[0.2em] uppercase">Smart Village Portal</p>
            </div>

            <form onsubmit="handleLogin(event)" class="space-y-5">
                
                <div class="space-y-1.5">
                    <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-2">Username</label>
                    <div class="input-group flex items-center bg-white/60 rounded-2xl border border-slate-200 p-1.5">
                        <div class="w-12 flex justify-center text-slate-400">
                            <i data-lucide="user" class="w-5 h-5"></i>
                        </div>
                        <input type="text" id="username" 
                            class="flex-1 bg-transparent py-2.5 pr-4 text-slate-800 placeholder-slate-400 outline-none w-full font-medium" 
                            placeholder="กรอกชื่อผู้ใช้งาน" required autocomplete="username">
                    </div>
                </div>

                <div class="space-y-1.5">
                    <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-2">Password</label>
                    <div class="input-group flex items-center bg-white/60 rounded-2xl border border-slate-200 p-1.5">
                        <div class="w-12 flex justify-center text-slate-400">
                            <i data-lucide="lock" class="w-5 h-5"></i>
                        </div>
                        <input type="password" id="password" 
                            class="flex-1 bg-transparent py-2.5 pr-4 text-slate-800 placeholder-slate-400 outline-none w-full font-medium" 
                            placeholder="••••••••" required autocomplete="current-password">
                    </div>
                </div>

                <button type="submit" class="w-full relative group mt-8 pt-2">
                    <div class="absolute -inset-0.5 bg-gradient-to-r from-indigo-500 to-violet-500 rounded-2xl blur opacity-30 group-hover:opacity-60 transition duration-300"></div>
                    <div class="relative w-full bg-slate-800 border border-slate-700 text-white font-bold py-4 rounded-2xl flex items-center justify-center gap-2 transform transition-all active:scale-[0.98]">
                        <span id="btn-text">เข้าสู่ระบบ</span>
                        <i data-lucide="arrow-right" class="w-5 h-5 group-hover:translate-x-1 transition-transform"></i>
                    </div>
                </button>
            </form>

            <div class="mt-8 text-center">
                <a href="register.html" class="text-sm text-slate-500 hover:text-slate-800 transition-colors">
                    ยังไม่มีบัญชี? <span class="text-indigo-600 font-bold ml-1 hover:underline underline-offset-4">สมัครสมาชิก</span>
                </a>
            </div>
        </div>
        
        <p class="text-center text-xs text-slate-400 mt-8 font-medium">IoT Management System &copy; 2026</p>
    </div>

    <script>
        lucide.createIcons();
        
        async function handleLogin(e) {
            e.preventDefault();
            const btnText = document.getElementById('btn-text');
            const originalText = btnText.innerText;
            btnText.innerText = 'กำลังตรวจสอบ...';
            
            const user = document.getElementById('username').value; 
            const pass = document.getElementById('password').value;
            
            try { 
                const res = await fetch('api/login.php', { 
                    method: 'POST', 
                    body: JSON.stringify({ username: user, password: pass }) 
                }); 
                const d = await res.json(); 
                
                if (d.status === 'success') {
                    document.body.style.opacity = '0';
                    document.body.style.transition = 'opacity 0.5s ease';
                    setTimeout(() => {
                        window.location.href = 'index.html'; 
                    }, 500);
                } else {
                    alert('❌ ' + d.message);
                    btnText.innerText = originalText;
                } 
            } catch (e) { 
                alert('⚠️ ไม่สามารถเชื่อมต่อฐานข้อมูลได้'); 
                btnText.innerText = originalText;
            }
        }
    </script>
</body>
</html>
