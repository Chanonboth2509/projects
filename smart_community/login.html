<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Smart Community</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Mali', 'Nunito', sans-serif;
            background-color: #0f172a;
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(339,49%,30%,1) 0, transparent 50%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .input-glass {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            transition: all 0.3s ease;
        }
        .input-glass:focus {
            background: rgba(15, 23, 42, 0.8);
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
            outline: none;
        }
        .btn-primary {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -10px rgba(59, 130, 246, 0.5);
        }
        .shake {
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
        }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }
    </style>
</head>
<body class="p-4">

    <div class="glass-panel w-full max-w-md rounded-3xl p-8 relative overflow-hidden" id="loginCard">
        <div class="absolute -top-24 -right-24 w-48 h-48 bg-blue-500 rounded-full mix-blend-multiply filter blur-3xl opacity-20"></div>
        <div class="absolute -bottom-24 -left-24 w-48 h-48 bg-purple-500 rounded-full mix-blend-multiply filter blur-3xl opacity-20"></div>

        <div class="relative z-10">
            <div class="text-center mb-10">
                <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-blue-500/10 border border-blue-500/20 mb-6">
                    <i data-lucide="shield-check" class="w-8 h-8 text-blue-400"></i>
                </div>
                <h1 class="text-3xl font-bold text-white mb-2 font-['Plus_Jakarta_Sans']">Admin Portal</h1>
                <p class="text-slate-400">ระบบจัดการ Smart Community SOS</p>
            </div>

            <div id="errorMessage" class="hidden mb-6 p-4 rounded-xl bg-rose-500/10 border border-rose-500/20 flex items-center gap-3 text-rose-400">
                <i data-lucide="alert-circle" class="w-5 h-5 shrink-0"></i>
                <p class="text-sm" id="errorText">ชื่อผู้ใช้งานหรือรหัสผ่านไม่ถูกต้อง</p>
            </div>

            <form id="loginForm" class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">ชื่อผู้ใช้งาน</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i data-lucide="user" class="w-5 h-5 text-slate-500"></i>
                        </div>
                        <input type="text" id="username" required
                            class="input-glass w-full rounded-xl pl-11 pr-4 py-3 text-sm placeholder-slate-500"
                            placeholder="กรอกชื่อผู้ใช้งาน">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">รหัสผ่าน</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i data-lucide="lock" class="w-5 h-5 text-slate-500"></i>
                        </div>
                        <input type="password" id="password" required
                            class="input-glass w-full rounded-xl pl-11 pr-4 py-3 text-sm placeholder-slate-500"
                            placeholder="••••••••">
                        <button type="button" id="togglePassword" class="absolute inset-y-0 right-0 pr-4 flex items-center text-slate-500 hover:text-slate-300 transition-colors">
                            <i data-lucide="eye" class="w-5 h-5" id="eyeIcon"></i>
                        </button>
                    </div>
                </div>

                <div class="flex items-center justify-between text-sm">
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" class="rounded border-slate-600 bg-slate-800 text-blue-500 focus:ring-blue-500 focus:ring-offset-slate-900">
                        <span class="text-slate-400">จดจำการเข้าสู่ระบบ</span>
                    </label>
                </div>

                <button type="submit" id="submitBtn" class="btn-primary w-full rounded-xl py-3.5 text-white font-semibold flex items-center justify-center gap-2">
                    <span>เข้าสู่ระบบ</span>
                    <i data-lucide="arrow-right" class="w-5 h-5"></i>
                </button>
            </form>

            <div class="mt-8 text-center text-sm text-slate-500">
                <p>มีปัญหาการเข้าสู่ระบบ? <a href="#" class="text-blue-400 hover:text-blue-300 transition-colors">ติดต่อผู้ดูแลระบบ</a></p>
            </div>
        </div>
        
        <div id="successOverlay" class="absolute inset-0 bg-slate-900/90 backdrop-blur-sm z-50 hidden flex-col items-center justify-center text-white transition-opacity duration-300 opacity-0">
            <div class="w-16 h-16 bg-emerald-500/20 border border-emerald-500/50 rounded-full flex items-center justify-center mb-4">
                <i data-lucide="check" class="w-8 h-8 text-emerald-400"></i>
            </div>
            <h3 class="text-xl font-bold mb-1">เข้าสู่ระบบสำเร็จ</h3>
            <p class="text-slate-400 text-sm">กำลังพาท่านเข้าสู่ระบบ...</p>
        </div>
    </div>

    <script>
        lucide.createIcons();

        const loginForm = document.getElementById('loginForm');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const togglePassword = document.getElementById('togglePassword');
        const eyeIcon = document.getElementById('eyeIcon');
        const loginCard = document.getElementById('loginCard');
        const errorMessage = document.getElementById('errorMessage');
        const errorText = document.getElementById('errorText');
        const submitBtn = document.getElementById('submitBtn');
        const successOverlay = document.getElementById('successOverlay');

        togglePassword.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            if (type === 'text') {
                eyeIcon.setAttribute('data-lucide', 'eye-off');
            } else {
                eyeIcon.setAttribute('data-lucide', 'eye');
            }
            lucide.createIcons();
        });

        function showError(message) {
            errorText.textContent = message;
            errorMessage.classList.remove('hidden');
            loginCard.classList.remove('shake');
            void loginCard.offsetWidth;
            loginCard.classList.add('shake');
            
            submitBtn.innerHTML = `
                <span>เข้าสู่ระบบ</span>
                <i data-lucide="arrow-right" class="w-5 h-5"></i>
            `;
            submitBtn.disabled = false;
            lucide.createIcons();
        }

        function showSuccess() {
            successOverlay.classList.remove('hidden');
            requestAnimationFrame(() => {
                successOverlay.classList.remove('opacity-0');
            });
        }

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            errorMessage.classList.add('hidden');
            submitBtn.disabled = true;
            submitBtn.innerHTML = `
                <i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i>
                <span>กำลังตรวจสอบ...</span>
            `;
            lucide.createIcons();

            try {
                const response = await fetch('api/auth.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        username: usernameInput.value,
                        password: passwordInput.value
                    })
                });

                const data = await response.json();

                if (data.status === 'success') {
                    localStorage.setItem('admin_name', usernameInput.value);
                    showSuccess();
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1500);
                } else {
                    showError(data.message || 'ชื่อผู้ใช้งานหรือรหัสผ่านไม่ถูกต้อง');
                }
            } catch (error) {
                console.error('Error:', error);
                showError('ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้');
            }
        });

        usernameInput.addEventListener('input', () => errorMessage.classList.add('hidden'));
        passwordInput.addEventListener('input', () => errorMessage.classList.add('hidden'));
    </script>
</body>
</html>
