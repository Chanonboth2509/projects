<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Members - Smart Community</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Sarabun:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Sarabun', 'Plus Jakarta Sans', sans-serif;
            background-color: #f8fafc;
        }

        .glass-sidebar {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(255, 255, 255, 0.5);
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .mesh-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            background: radial-gradient(circle at 0% 0%, #e0e7ff 0%, transparent 50%), radial-gradient(circle at 100% 0%, #f0fdf4 0%, transparent 50%), radial-gradient(circle at 100% 100%, #fff1f2 0%, transparent 50%), radial-gradient(circle at 0% 100%, #fefce8 0%, transparent 50%);
            opacity: 0.6;
        }
    </style>
</head>

<body class="h-screen flex overflow-hidden text-slate-800">

    <div class="mesh-bg"></div>
    <div id="mobile-overlay"
        class="fixed inset-0 bg-slate-900/40 z-40 hidden backdrop-blur-sm lg:hidden transition-opacity"
        onclick="toggleSidebar()"></div>

    <aside id="sidebar"
        class="fixed lg:static inset-y-0 left-0 w-[280px] glass-sidebar z-50 transform -translate-x-full lg:translate-x-0 transition-transform duration-300 ease-in-out flex flex-col h-full lg:h-[96vh] lg:my-[2vh] lg:ml-[2vh] lg:rounded-3xl shadow-2xl lg:shadow-xl">
        <div class="h-24 flex items-center px-8">
            <div class="flex items-center gap-3">
                <div class="bg-gradient-to-br from-indigo-600 to-violet-600 p-3 rounded-2xl shadow-lg"><i
                        data-lucide="radio-receiver" class="text-white w-6 h-6"></i></div>
                <div>
                    <h1 class="text-xl font-extrabold text-slate-800 tracking-tight">LoRa Admin</h1>
                    <p class="text-[10px] font-semibold text-indigo-500 tracking-wider uppercase">Smart Village</p>
                </div>
            </div>
        </div>
        <nav class="flex-1 overflow-y-auto px-4 py-4 space-y-2">
            <p class="px-4 text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-2">Menu</p>
            <a href="index.html"
                class="flex items-center gap-3.5 px-4 py-3.5 rounded-2xl text-sm font-medium text-slate-500 hover:text-indigo-600 hover:bg-indigo-50/80 transition-all group"><i
                    data-lucide="layout-grid"
                    class="w-5 h-5 group-hover:scale-110 transition-transform"></i><span>ภาพรวมระบบ</span></a>
            <a href="members.html"
                class="flex items-center gap-3.5 px-4 py-3.5 rounded-2xl text-sm font-semibold text-white bg-slate-900 shadow-lg shadow-slate-900/20 transition-all group relative overflow-hidden">
                <div
                    class="absolute inset-0 bg-gradient-to-r from-indigo-600 to-violet-600 opacity-0 group-hover:opacity-100 transition-opacity duration-300">
                </div>
                <i data-lucide="users" class="w-5 h-5 relative z-10"></i><span
                    class="relative z-10">รายชื่อลูกบ้าน</span>
                <div
                    class="ml-auto w-1.5 h-1.5 rounded-full bg-emerald-400 shadow-[0_0_8px_rgba(52,211,153,0.8)] relative z-10">
                </div>
            </a>
            <a href="devices.html"
                class="flex items-center gap-3.5 px-4 py-3.5 rounded-2xl text-sm font-medium text-slate-500 hover:text-indigo-600 hover:bg-indigo-50/80 transition-all group"><i
                    data-lucide="cpu" class="w-5 h-5 group-hover:scale-110 transition-transform"></i><span>อุปกรณ์
                    LoRa</span></a>
            <p class="px-4 text-[11px] font-bold text-slate-400 uppercase tracking-widest mt-8 mb-2">System</p>
            <a href="notifications.html"
                class="flex items-center gap-3.5 px-4 py-3.5 rounded-2xl text-sm font-medium text-slate-500 hover:text-indigo-600 hover:bg-indigo-50/80 transition-all group"><i
                    data-lucide="bell-ring"
                    class="w-5 h-5 group-hover:scale-110 transition-transform"></i><span>แจ้งเตือน & SOS</span></a>
            <a href="reports.html"
                class="flex items-center gap-3.5 px-4 py-3.5 rounded-2xl text-sm font-medium text-slate-500 hover:text-indigo-600 hover:bg-indigo-50/80 transition-all group"><i
                    data-lucide="file-clock"
                    class="w-5 h-5 group-hover:scale-110 transition-transform"></i><span>ประวัติย้อนหลัง</span></a>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col min-w-0 h-full overflow-hidden relative">
        <header class="h-24 flex items-center justify-between px-8 lg:px-10 z-30">
            <div class="flex items-center gap-4">
                <button onclick="toggleSidebar()"
                    class="lg:hidden p-3 text-slate-500 bg-white/80 backdrop-blur-md rounded-2xl"><i data-lucide="menu"
                        class="w-6 h-6"></i></button>
                <div>
                    <h2 class="text-2xl font-bold text-slate-800">รายชื่อลูกบ้าน</h2>
                    <p class="text-sm text-slate-500 font-medium">จัดการข้อมูลสมาชิกในชุมชน</p>
                </div>
            </div>
            <button onclick="openAddModal()"
                class="flex items-center gap-2 bg-slate-900 hover:bg-indigo-600 text-white px-5 py-2.5 rounded-full font-bold shadow-lg transition-all hover:shadow-indigo-500/30 active:scale-95">
                <i data-lucide="plus" class="w-4 h-4"></i> เพิ่มรายชื่อ
            </button>
        </header>

        <div class="flex-1 overflow-auto px-6 lg:px-10 pb-10">
            <div class="mb-6 relative max-w-md">
                <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400"></i>
                <input type="text" placeholder="ค้นหาชื่อ, เบอร์โทร..."
                    class="w-full pl-12 pr-4 py-3 glass-panel rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500/50 transition-all placeholder:text-slate-400 text-sm">
            </div>

            <div class="glass-panel rounded-[2rem] overflow-hidden shadow-sm">
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr
                                class="bg-white/50 border-b border-slate-100 text-slate-500 text-xs uppercase tracking-wider">
                                <th class="px-8 py-5 font-bold">ชื่อ-นามสกุล</th>
                                <th class="px-6 py-5 font-bold">ที่อยู่</th>
                                <th class="px-6 py-5 font-bold">เบอร์โทรศัพท์</th>
                                <th class="px-6 py-5 font-bold">ติดต่อฉุกเฉิน</th>
                                <th class="px-6 py-5 font-bold text-right">จัดการ</th>
                            </tr>
                        </thead>
                        <tbody id="memberTableBody" class="divide-y divide-slate-100/50 text-slate-600 text-sm">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <div id="addMemberModal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onclick="closeModal()"></div>
        <div
            class="relative bg-white rounded-[2rem] shadow-2xl w-full max-w-lg overflow-hidden animate-in fade-in zoom-in-95 duration-200">
            <div class="px-8 py-6 border-b border-slate-100 flex items-center justify-between bg-slate-50/50">
                <h3 id="modalTitle" class="text-lg font-bold text-slate-800">เพิ่มสมาชิกใหม่</h3>
                <button class="text-slate-400 hover:text-slate-600 bg-white p-2 rounded-full shadow-sm"
                    onclick="closeModal()"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            <div class="p-8 space-y-5">
                <input type="hidden" id="mId">
                <div><label class="block text-sm font-bold text-slate-700 mb-2">ชื่อ-นามสกุล</label><input type="text"
                        id="mName"
                        class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500/20 outline-none transition-all">
                </div>
                <div><label class="block text-sm font-bold text-slate-700 mb-2">ที่อยู่</label><textarea id="mAddr"
                        rows="2"
                        class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none"></textarea>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="block text-sm font-bold text-slate-700 mb-2">เบอร์โทร</label><input type="tel"
                            id="mPhone"
                            class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none"></div>
                    <div><label class="block text-sm font-bold text-slate-700 mb-2">ผู้ติดต่อฉุกเฉิน</label><input
                            type="text" id="mEmName"
                            class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none"></div>
                </div>
                <div><label class="block text-sm font-bold text-slate-700 mb-2">เบอร์ฉุกเฉิน</label><input type="tel"
                        id="mEmPhone"
                        class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none"></div>
            </div>
            <div class="px-8 py-6 bg-slate-50 flex justify-end gap-3 border-t border-slate-100">
                <button class="px-6 py-2.5 text-slate-600 hover:bg-slate-200 rounded-xl font-bold transition-colors"
                    onclick="closeModal()">ยกเลิก</button>
                <button onclick="saveMember()"
                    class="px-6 py-2.5 bg-indigo-600 text-white hover:bg-indigo-700 rounded-xl font-bold shadow-lg transition-all">บันทึกข้อมูล</button>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        lucide.createIcons();
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('-translate-x-full'); document.getElementById('mobile-overlay').classList.toggle('hidden'); }

        // Modal Logic
        window.openAddModal = function () { document.getElementById('modalTitle').innerText = 'เพิ่มสมาชิกใหม่'; document.getElementById('mId').value = ''; document.getElementById('mName').value = ''; document.getElementById('mAddr').value = ''; document.getElementById('mPhone').value = ''; document.getElementById('mEmName').value = ''; document.getElementById('mEmPhone').value = ''; document.getElementById('addMemberModal').classList.remove('hidden'); }
        window.closeModal = function () { document.getElementById('addMemberModal').classList.add('hidden'); }

        async function renderMembers() {
            const tbody = document.getElementById('memberTableBody');
            tbody.innerHTML = '<tr><td colspan="5" class="text-center py-10 text-slate-400">Loading...</td></tr>';
            try {
                const members = await db.getMembers();
                if (members.length === 0) { tbody.innerHTML = '<tr><td colspan="5" class="text-center py-10 text-slate-400">ไม่พบข้อมูล</td></tr>'; return; }
                tbody.innerHTML = members.map(m => `
                    <tr class="hover:bg-indigo-50/30 transition-colors group">
                        <td class="px-8 py-4">
                            <div class="flex items-center gap-4">
                                <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-indigo-100 to-white border border-indigo-100 flex items-center justify-center text-indigo-600 font-bold shadow-sm">
                                    ${m.name.charAt(0)}
                                </div>
                                <div><p class="font-bold text-slate-800">${m.name}</p><p class="text-xs text-slate-400">ID: ${m.id}</p></div>
                            </div>
                        </td>
                        <td class="px-6 py-4 text-slate-500">${m.address}</td>
                        <td class="px-6 py-4"><span class="px-3 py-1 bg-white border border-slate-200 rounded-lg text-xs font-mono text-slate-600">${m.phone}</span></td>
                        <td class="px-6 py-4"><div class="text-xs"><span class="font-bold text-slate-700">${m.emergency.name}</span><br><span class="text-slate-400">${m.emergency.phone}</span></div></td>
                        <td class="px-6 py-4 text-right">
                            <button class="p-2 text-slate-400 hover:text-indigo-600 hover:bg-white rounded-lg transition-all" onclick="openEditModal(${m.id})"><i data-lucide="pencil" class="w-4 h-4"></i></button>
                            <button class="p-2 text-slate-400 hover:text-red-600 hover:bg-white rounded-lg transition-all" onclick="deleteMember(${m.id})"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                        </td>
                    </tr>
                `).join('');
                lucide.createIcons();
            } catch (e) { console.error(e); }
        }

        // Keep saveMember, deleteMember, openEditModal logic same as before (refer to previous app.js logic)
        window.saveMember = async function () { const id = document.getElementById('mId').value; const name = document.getElementById('mName').value; const address = document.getElementById('mAddr').value; const phone = document.getElementById('mPhone').value; if (!name) return; const memberData = { id: id ? id : null, name, address, phone, emergency: { name: document.getElementById('mEmName').value, phone: document.getElementById('mEmPhone').value } }; await db.addMember(memberData); closeModal(); renderMembers(); }
        window.openEditModal = async function (id) { const members = await db.getMembers(); const m = members.find(x => x.id == id); if (m) { document.getElementById('modalTitle').innerText = 'แก้ไขข้อมูล'; document.getElementById('mId').value = m.id; document.getElementById('mName').value = m.name; document.getElementById('mAddr').value = m.address; document.getElementById('mPhone').value = m.phone; document.getElementById('mEmName').value = m.emergency.name; document.getElementById('mEmPhone').value = m.emergency.phone; document.getElementById('addMemberModal').classList.remove('hidden'); } }
        window.deleteMember = async function (id) { if (confirm('ลบ?')) { await db.deleteMember(id); renderMembers(); } }

        renderMembers();
    </script>
</body>

</html>
