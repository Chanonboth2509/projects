<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications - LoRa Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Sarabun:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Sarabun', 'Plus Jakarta Sans', sans-serif;
            background-color: #f8fafc;
        }

        .glass-sidebar {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(255, 255, 255, 0.5);
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .mesh-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            background: radial-gradient(circle at 0% 0%, #e0e7ff 0%, transparent 50%), radial-gradient(circle at 100% 0%, #f0fdf4 0%, transparent 50%), radial-gradient(circle at 100% 100%, #fff1f2 0%, transparent 50%), radial-gradient(circle at 0% 100%, #fefce8 0%, transparent 50%);
            opacity: 0.6;
        }

        .quick-btn {
            transition: all 0.2s ease;
        }

        .quick-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>

<body class="h-screen flex overflow-hidden text-slate-800">

    <div class="mesh-bg"></div>
    <div id="mobile-overlay"
        class="fixed inset-0 bg-slate-900/40 z-40 hidden backdrop-blur-sm lg:hidden transition-opacity"
        onclick="toggleSidebar()"></div>

    <aside id="sidebar"
        class="fixed lg:static inset-y-0 left-0 w-[280px] glass-sidebar z-50 transform -translate-x-full lg:translate-x-0 transition-transform duration-300 ease-in-out flex flex-col h-full lg:h-[96vh] lg:my-[2vh] lg:ml-[2vh] lg:rounded-3xl shadow-2xl lg:shadow-xl">
        <div class="h-24 flex items-center px-8">
            <div class="flex items-center gap-3">
                <div class="bg-gradient-to-br from-indigo-600 to-violet-600 p-3 rounded-2xl shadow-lg"><i
                        data-lucide="radio-receiver" class="text-white w-6 h-6"></i></div>
                <div>
                    <h1 class="text-xl font-extrabold text-slate-800 tracking-tight">LoRa Admin</h1>
                    <p class="text-[10px] font-semibold text-indigo-500 tracking-wider uppercase">Smart Village</p>
                </div>
            </div>
        </div>
        <nav class="flex-1 overflow-y-auto px-4 py-4 space-y-2">
            <p class="px-4 text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-2">Menu</p>
            <a href="index.html"
                class="flex items-center gap-3.5 px-4 py-3.5 rounded-2xl text-sm font-medium text-slate-500 hover:text-indigo-600 hover:bg-indigo-50/80 transition-all group"><i
                    data-lucide="layout-grid"
                    class="w-5 h-5 group-hover:scale-110 transition-transform"></i><span>ภาพรวมระบบ</span></a>
            <a href="members.html"
                class="flex items-center gap-3.5 px-4 py-3.5 rounded-2xl text-sm font-medium text-slate-500 hover:text-indigo-600 hover:bg-indigo-50/80 transition-all group"><i
                    data-lucide="users"
                    class="w-5 h-5 group-hover:scale-110 transition-transform"></i><span>รายชื่อลูกบ้าน</span></a>
            <a href="devices.html"
                class="flex items-center gap-3.5 px-4 py-3.5 rounded-2xl text-sm font-medium text-slate-500 hover:text-indigo-600 hover:bg-indigo-50/80 transition-all group"><i
                    data-lucide="cpu" class="w-5 h-5 group-hover:scale-110 transition-transform"></i><span>อุปกรณ์
                    LoRa</span></a>
            <p class="px-4 text-[11px] font-bold text-slate-400 uppercase tracking-widest mt-8 mb-2">System</p>
            <a href="notifications.html"
                class="flex items-center gap-3.5 px-4 py-3.5 rounded-2xl text-sm font-semibold text-white bg-slate-900 shadow-lg shadow-slate-900/20 transition-all group relative overflow-hidden">
                <div
                    class="absolute inset-0 bg-gradient-to-r from-indigo-600 to-violet-600 opacity-0 group-hover:opacity-100 transition-opacity duration-300">
                </div>
                <i data-lucide="bell-ring" class="w-5 h-5 relative z-10"></i><span class="relative z-10">แจ้งเตือน &
                    SOS</span>
            </a>
            <a href="reports.html"
                class="flex items-center gap-3.5 px-4 py-3.5 rounded-2xl text-sm font-medium text-slate-500 hover:text-indigo-600 hover:bg-indigo-50/80 transition-all group"><i
                    data-lucide="file-clock"
                    class="w-5 h-5 group-hover:scale-110 transition-transform"></i><span>ประวัติย้อนหลัง</span></a>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col min-w-0 h-full overflow-hidden relative">
        <header class="h-24 flex items-center justify-between px-8 lg:px-10 z-30">
            <div class="flex items-center gap-4">
                <button onclick="toggleSidebar()"
                    class="lg:hidden p-3 text-slate-500 bg-white/80 backdrop-blur-md rounded-2xl"><i data-lucide="menu"
                        class="w-6 h-6"></i></button>
                <div>
                    <h2 class="text-2xl font-bold text-slate-800">ศูนย์การแจ้งเตือน</h2>
                    <p class="text-sm text-slate-500 font-medium">ส่งประกาศเสียงตามสายและจัดการเหตุ</p>
                </div>
            </div>
        </header>

        <div class="flex-1 overflow-auto px-6 lg:px-10 pb-10">
            <div class="grid grid-cols-1 xl:grid-cols-2 gap-8">

                <div class="glass-panel p-8 rounded-[2rem] xl:order-2">
                    <div class="flex items-center justify-between mb-6">
                        <div class="flex items-center gap-3">
                            <div
                                class="w-10 h-10 rounded-xl bg-indigo-100 flex items-center justify-center text-indigo-600">
                                <i data-lucide="radio" class="w-5 h-5"></i>
                            </div>
                            <h3 class="text-lg font-bold text-slate-800">ส่งประกาศ</h3>
                        </div>
                        <span class="text-xs bg-indigo-50 text-indigo-600 px-2 py-1 rounded-lg font-bold">เลือกแบบด่วน
                            👇</span>
                    </div>

                    <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6">
                        <button
                            onclick="fillTemplate('นัดประชุมหมู่บ้าน', 'ขอเชิญลูกบ้านทุกท่านเข้าร่วมประชุมประจำเดือน ในวันที่... เวลา... ณ ศาลากลางหมู่บ้าน', 'General')"
                            class="quick-btn p-3 rounded-xl bg-blue-50 border border-blue-100 text-center text-blue-700 cursor-pointer hover:bg-blue-100">
                            <div
                                class="w-8 h-8 mx-auto bg-white rounded-full flex items-center justify-center mb-2 shadow-sm">
                                <i data-lucide="users" class="w-4 h-4"></i>
                            </div>
                            <span class="text-xs font-bold block">นัดประชุม</span>
                        </button>
                        <button
                            onclick="fillTemplate('แจ้งฉีดพ่นยุงลาย', 'จะมีการฉีดพ่นหมอกควันกำจัดยุงลาย ในวันที่... ขอให้เก็บอาหารและสัตว์เลี้ยงให้มิดชิด', 'General')"
                            class="quick-btn p-3 rounded-xl bg-emerald-50 border border-emerald-100 text-center text-emerald-700 cursor-pointer hover:bg-emerald-100">
                            <div
                                class="w-8 h-8 mx-auto bg-white rounded-full flex items-center justify-center mb-2 shadow-sm">
                                <i data-lucide="spray-can" class="w-4 h-4"></i>
                            </div>
                            <span class="text-xs font-bold block">ฉีดยุงลาย</span>
                        </button>
                        <button
                            onclick="fillTemplate('แจ้งเตือนพายุ', 'ประกาศเตือนพายุฤดูร้อน ขอให้ตรวจสอบความแข็งแรงของบ้านเรือนและระมัดระวังอันตราย', 'Emergency')"
                            class="quick-btn p-3 rounded-xl bg-amber-50 border border-amber-100 text-center text-amber-700 cursor-pointer hover:bg-amber-100">
                            <div
                                class="w-8 h-8 mx-auto bg-white rounded-full flex items-center justify-center mb-2 shadow-sm">
                                <i data-lucide="cloud-lightning" class="w-4 h-4"></i>
                            </div>
                            <span class="text-xs font-bold block">เตือนพายุ</span>
                        </button>
                        <button
                            onclick="fillTemplate('แจ้งเหตุเพลิงไหม้!', 'ด่วน! ขณะนี้เกิดเหตุเพลิงไหม้บริเวณ... ขอให้หลีกเลี่ยงเส้นทางและเตรียมพร้อมอพยพ', 'Emergency')"
                            class="quick-btn p-3 rounded-xl bg-red-50 border border-red-100 text-center text-red-700 shadow-sm cursor-pointer hover:bg-red-100">
                            <div
                                class="w-8 h-8 mx-auto bg-white rounded-full flex items-center justify-center mb-2 shadow-sm text-red-600 animate-pulse">
                                <i data-lucide="flame" class="w-4 h-4"></i>
                            </div>
                            <span class="text-xs font-bold block">แจ้งไฟไหม้!</span>
                        </button>
                    </div>

                    <div class="space-y-5">
                        <div>
                            <label class="block text-sm font-bold text-slate-700 mb-2">หัวข้อประกาศ</label>
                            <input type="text" id="nTitle"
                                class="w-full px-4 py-3 bg-white border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500/20 outline-none font-semibold text-slate-700"
                                placeholder="พิมพ์หัวข้อเรื่อง...">
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-slate-700 mb-2">ความเร่งด่วน</label>
                            <div class="flex gap-4">
                                <label class="flex-1 cursor-pointer group relative">
                                    <input type="radio" name="nType" value="General" id="radioGeneral"
                                        class="peer sr-only" checked>
                                    <div
                                        class="p-3.5 rounded-xl border border-slate-200 bg-white peer-checked:bg-indigo-50 peer-checked:border-indigo-500 peer-checked:text-indigo-700 transition-all text-center flex items-center justify-center gap-2 hover:bg-slate-50">
                                        <i data-lucide="info" class="w-4 h-4"></i><span
                                            class="text-sm font-bold">ทั่วไป</span>
                                    </div>
                                    <div
                                        class="absolute top-2 right-2 w-2 h-2 bg-indigo-500 rounded-full opacity-0 peer-checked:opacity-100 transition-opacity">
                                    </div>
                                </label>
                                <label class="flex-1 cursor-pointer group relative">
                                    <input type="radio" name="nType" value="Emergency" id="radioEmergency"
                                        class="peer sr-only">
                                    <div
                                        class="p-3.5 rounded-xl border border-slate-200 bg-white peer-checked:bg-red-50 peer-checked:border-red-500 peer-checked:text-red-700 transition-all text-center flex items-center justify-center gap-2 hover:bg-slate-50">
                                        <i data-lucide="siren" class="w-4 h-4"></i><span
                                            class="text-sm font-bold">ฉุกเฉิน</span>
                                    </div>
                                </label>
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-slate-700 mb-2">เนื้อหา</label>
                            <textarea id="nContent" rows="4"
                                class="w-full px-4 py-3 bg-white border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500/20 outline-none text-slate-600 leading-relaxed"></textarea>
                        </div>
                        <button onclick="sendNotification()"
                            class="w-full py-4 bg-slate-900 hover:bg-indigo-600 text-white rounded-xl font-bold shadow-lg shadow-indigo-500/20 transition-all flex items-center justify-center gap-2 active:scale-[0.98]">
                            <i data-lucide="send" class="w-5 h-5"></i> ยืนยันส่งประกาศ
                        </button>
                    </div>
                </div>

                <div class="space-y-8 xl:order-1">
                    <div id="sosCard"
                        class="p-8 rounded-[2rem] bg-gradient-to-br from-white to-slate-50 border border-slate-200 shadow-sm relative overflow-hidden transition-all duration-500">
                        <div class="flex justify-between items-center mb-6 relative z-10">
                            <div class="flex items-center gap-3">
                                <div id="sosIconBg"
                                    class="w-12 h-12 rounded-2xl bg-white shadow-sm flex items-center justify-center text-slate-400 transition-colors border border-slate-100">
                                    <i data-lucide="siren" class="w-6 h-6"></i>
                                </div>
                                <div>
                                    <h3 class="text-lg font-bold text-slate-800">SOS Monitor</h3>
                                    <p
                                        class="text-xs text-slate-500 font-bold uppercase tracking-wider flex items-center gap-1">
                                        <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span> Live
                                        Feed
                                    </p>
                                </div>
                            </div>
                        </div>

                        <div id="sosContent"
                            class="bg-white/60 backdrop-blur-md rounded-2xl p-8 border border-slate-100 text-center min-h-[220px] flex flex-col items-center justify-center transition-all">
                            <div
                                class="w-20 h-20 bg-slate-50 rounded-full flex items-center justify-center mb-4 shadow-inner">
                                <i data-lucide="shield-check" class="w-10 h-10 text-emerald-500"></i>
                            </div>
                            <h4 class="text-lg font-bold text-slate-700">เหตุการณ์ปกติ</h4>
                            <p class="text-sm text-slate-500 mt-1">ยังไม่มีการแจ้งเตือนฉุกเฉิน</p>
                        </div>
                    </div>

                    <div>
                        <h3 class="text-lg font-bold text-slate-800 mb-4 px-2">ประวัติประกาศล่าสุด</h3>
                        <div id="recentNotes" class="space-y-3">
                            <div class="glass-panel p-6 text-center text-slate-400 text-sm">กำลังโหลด...</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="js/app.js"></script>
    <script>
        lucide.createIcons();
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('-translate-x-full'); document.getElementById('mobile-overlay').classList.toggle('hidden'); }

        // ฟังก์ชันกรอกอัตโนมัติ
        function fillTemplate(title, content, type) {
            document.getElementById('nTitle').value = title;
            document.getElementById('nContent').value = content;
            if (type === 'Emergency') document.getElementById('radioEmergency').checked = true;
            else document.getElementById('radioGeneral').checked = true;
        }

        // ฟังก์ชันส่งประกาศ (เชื่อมต่อ API)
        async function sendNotification() {
            const title = document.getElementById('nTitle').value;
            const content = document.getElementById('nContent').value;
            const type = document.querySelector('input[name="nType"]:checked').value;

            if (!title || !content) return alert('กรุณากรอกข้อมูล');

            if (confirm('ยืนยันการส่งประกาศ?')) {
                try {
                    const res = await fetch('api/notifications.php', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ title, content, type })
                    });
                    const result = await res.json();

                    if (result.status === 'success') {
                        alert('✅ ส่งข้อมูลเรียบร้อยแล้ว!');
                        document.getElementById('nTitle').value = '';
                        document.getElementById('nContent').value = '';
                        renderRecent();
                    } else {
                        alert('❌ Error: ' + result.message);
                    }
                } catch (e) { alert('เชื่อมต่อ Server ไม่ได้'); console.error(e); }
            }
        }

        // ฟังก์ชันดึงประวัติ
        async function renderRecent() {
            const container = document.getElementById('recentNotes');
            try {
                const res = await fetch('api/notifications.php');
                const notes = await res.json();
                if (!Array.isArray(notes) || notes.length === 0) {
                    container.innerHTML = '<div class="glass-panel p-6 text-center text-slate-400 text-sm">ไม่มีประวัติ</div>';
                    return;
                }
                container.innerHTML = notes.slice(0, 3).map(n => `
                    <div class="glass-panel p-5 rounded-2xl mb-3 hover:bg-white/80 transition-colors">
                        <div class="flex justify-between mb-2">
                            <span class="font-bold text-slate-700 text-sm">${n.title}</span>
                            <span class="text-[10px] bg-slate-100 px-2 py-1 rounded">${n.date}</span>
                        </div>
                        <span class="px-2 py-0.5 rounded text-[10px] font-bold border ${n.type === 'Emergency' ? 'bg-red-50 text-red-600 border-red-100' : 'bg-blue-50 text-blue-600 border-blue-100'}">${n.type}</span>
                        <p class="text-xs text-slate-500 mt-2">${n.content}</p>
                    </div>
                `).join('');
            } catch (e) { console.error(e); }
        }

        // 🔥 ระบบเฝ้ายาม (SOS Monitor)
        // 🔥 ระบบเฝ้ายาม (SOS Monitor) - ฉบับแก้ไขแสดงทุกรายการ
        async function monitorSOS() {
            try {
                // 1. เรียกข้อมูลแจ้งเตือนล่าสุด
                const res = await fetch('api/get_alerts.php');
                const alerts = await res.json();

                // 2. กรองหาเคสที่สถานะเป็น 'pending' ทั้งหมด (เอาทั้ง SOS และ Security หรือ Type อื่นๆ ที่ไม่ใช่ General)
                // ถ้าต้องการแสดงทุกอย่างที่เป็น pending ให้ตัดเงื่อนไข a.type ออก
                const activeAlerts = alerts.filter(a => a.status === 'pending' && (a.type === 'SOS' || a.type === 'Security'));

                const sosCard = document.getElementById('sosCard');
                const sosContent = document.getElementById('sosContent');
                const sosIconBg = document.getElementById('sosIconBg');

                if (activeAlerts.length > 0) {
                    // 🚨 มีเหตุแจ้งเตือน (อย่างน้อย 1 รายการ) -> เปลี่ยนธีมเป็นสีแดง
                    sosCard.className = "p-8 rounded-[2rem] bg-red-50 border border-red-200 shadow-xl shadow-red-100/50 relative overflow-hidden transition-all duration-500 ring-2 ring-red-400 ring-offset-2";
                    sosIconBg.className = "w-12 h-12 rounded-2xl bg-red-500 text-white shadow-md flex items-center justify-center animate-bounce";

                    // สร้าง HTML สำหรับรายการแจ้งเตือนทั้งหมด
                    let alertListHTML = activeAlerts.map(alert => `
                <div class="bg-white/80 backdrop-blur-sm px-4 py-3 rounded-xl mt-3 border border-red-200 shadow-sm flex items-start gap-3 text-left">
                    <div class="mt-1 min-w-[20px]">
                        <i data-lucide="alert-triangle" class="w-5 h-5 text-red-600"></i>
                    </div>
                    <div class="w-full">
                        <div class="flex justify-between items-start">
                            <p class="text-sm text-red-800 font-bold">${alert.message}</p>
                            <span class="text-[10px] bg-red-100 text-red-600 px-1.5 py-0.5 rounded font-bold whitespace-nowrap">${alert.time}</span>
                        </div>
                        <p class="text-xs text-red-600 mt-1">${alert.detail}</p>
                    </div>
                </div>
            `).join('');

                    sosContent.innerHTML = `
                <div class="w-full">
                    <div class="text-center mb-4">
                        <div class="inline-flex w-16 h-16 bg-white rounded-full items-center justify-center shadow-lg animate-pulse mb-2">
                            <i data-lucide="flame" class="w-8 h-8 text-red-600"></i>
                        </div>
                        <h4 class="text-2xl font-extrabold text-red-600 animate-pulse">แจ้งเหตุฉุกเฉิน!</h4>
                        <p class="text-sm text-red-400">พบ ${activeAlerts.length} เหตุการณ์ที่ยังไม่ได้รับการแก้ไข</p>
                    </div>
                    
                    <div class="max-h-[300px] overflow-y-auto pr-1 space-y-1 custom-scrollbar">
                        ${alertListHTML}
                    </div>

                    <div class="text-center mt-5">
                        <button onclick="window.location.href='reports.html'" class="px-6 py-2.5 bg-red-600 hover:bg-red-700 text-white rounded-xl text-sm font-bold shadow-lg transition-all inline-flex items-center gap-2">
                            <span>จัดการเหตุการณ์</span> <i data-lucide="arrow-right" class="w-4 h-4"></i>
                        </button>
                    </div>
                </div>
            `;
                    lucide.createIcons();

                } else {
                    // 🟢 ปกติ -> กลับเป็นสีขาว (เหมือนเดิม)
                    sosCard.className = "p-8 rounded-[2rem] bg-gradient-to-br from-white to-slate-50 border border-slate-200 shadow-sm relative overflow-hidden transition-all duration-500";
                    sosIconBg.className = "w-12 h-12 rounded-2xl bg-white shadow-sm flex items-center justify-center text-slate-400 transition-colors border border-slate-100";
                    sosContent.innerHTML = `
                <div class="w-20 h-20 bg-slate-50 rounded-full flex items-center justify-center mb-4 shadow-inner">
                    <i data-lucide="shield-check" class="w-10 h-10 text-emerald-500"></i>
                </div>
                <h4 class="text-lg font-bold text-slate-700">เหตุการณ์ปกติ</h4>
                <p class="text-sm text-slate-500 mt-1">ยังไม่มีการแจ้งเตือนฉุกเฉิน</p>
            `;
                    lucide.createIcons();
                }
            } catch (e) { console.error("Monitor Error", e); }
        }

        renderRecent();
        monitorSOS();
        setInterval(monitorSOS, 2000); // เช็คทุก 2 วินาที
    </script>
</body>

</html>
