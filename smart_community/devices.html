<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Devices - LoRa Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Sarabun:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Sarabun', 'Plus Jakarta Sans', sans-serif;
            background-color: #f8fafc;
        }

        .glass-sidebar {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(255, 255, 255, 0.5);
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .mesh-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            background: radial-gradient(circle at 0% 0%, #e0e7ff 0%, transparent 50%), radial-gradient(circle at 100% 0%, #f0fdf4 0%, transparent 50%), radial-gradient(circle at 100% 100%, #fff1f2 0%, transparent 50%), radial-gradient(circle at 0% 100%, #fefce8 0%, transparent 50%);
            opacity: 0.6;
        }
    </style>
</head>

<body class="h-screen flex overflow-hidden text-slate-800">

    <div class="mesh-bg"></div>
    <div id="mobile-overlay"
        class="fixed inset-0 bg-slate-900/40 z-40 hidden backdrop-blur-sm lg:hidden transition-opacity"
        onclick="toggleSidebar()"></div>

    <aside id="sidebar"
        class="fixed lg:static inset-y-0 left-0 w-[280px] glass-sidebar z-50 transform -translate-x-full lg:translate-x-0 transition-transform duration-300 ease-in-out flex flex-col h-full lg:h-[96vh] lg:my-[2vh] lg:ml-[2vh] lg:rounded-3xl shadow-2xl lg:shadow-xl">
        <div class="h-24 flex items-center px-8">
            <div class="flex items-center gap-3">
                <div class="bg-gradient-to-br from-indigo-600 to-violet-600 p-3 rounded-2xl shadow-lg"><i
                        data-lucide="radio-receiver" class="text-white w-6 h-6"></i></div>
                <div>
                    <h1 class="text-xl font-extrabold text-slate-800 tracking-tight">LoRa Admin</h1>
                    <p class="text-[10px] font-semibold text-indigo-500 tracking-wider uppercase">Smart Village</p>
                </div>
            </div>
        </div>
        <nav class="flex-1 overflow-y-auto px-4 py-4 space-y-2">
            <p class="px-4 text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-2">Menu</p>
            <a href="index.html"
                class="flex items-center gap-3.5 px-4 py-3.5 rounded-2xl text-sm font-medium text-slate-500 hover:text-indigo-600 hover:bg-indigo-50/80 transition-all group"><i
                    data-lucide="layout-grid"
                    class="w-5 h-5 group-hover:scale-110 transition-transform"></i><span>ภาพรวมระบบ</span></a>
            <a href="members.html"
                class="flex items-center gap-3.5 px-4 py-3.5 rounded-2xl text-sm font-medium text-slate-500 hover:text-indigo-600 hover:bg-indigo-50/80 transition-all group"><i
                    data-lucide="users"
                    class="w-5 h-5 group-hover:scale-110 transition-transform"></i><span>รายชื่อลูกบ้าน</span></a>
            <a href="devices.html"
                class="flex items-center gap-3.5 px-4 py-3.5 rounded-2xl text-sm font-semibold text-white bg-slate-900 shadow-lg shadow-slate-900/20 transition-all group relative overflow-hidden">
                <div
                    class="absolute inset-0 bg-gradient-to-r from-indigo-600 to-violet-600 opacity-0 group-hover:opacity-100 transition-opacity duration-300">
                </div>
                <i data-lucide="cpu" class="w-5 h-5 relative z-10"></i><span class="relative z-10">อุปกรณ์ LoRa</span>
                <div
                    class="ml-auto w-1.5 h-1.5 rounded-full bg-emerald-400 shadow-[0_0_8px_rgba(52,211,153,0.8)] relative z-10">
                </div>
            </a>
            <p class="px-4 text-[11px] font-bold text-slate-400 uppercase tracking-widest mt-8 mb-2">System</p>
            <a href="notifications.html"
                class="flex items-center gap-3.5 px-4 py-3.5 rounded-2xl text-sm font-medium text-slate-500 hover:text-indigo-600 hover:bg-indigo-50/80 transition-all group"><i
                    data-lucide="bell-ring"
                    class="w-5 h-5 group-hover:scale-110 transition-transform"></i><span>แจ้งเตือน & SOS</span></a>
            <a href="reports.html"
                class="flex items-center gap-3.5 px-4 py-3.5 rounded-2xl text-sm font-medium text-slate-500 hover:text-indigo-600 hover:bg-indigo-50/80 transition-all group"><i
                    data-lucide="file-clock"
                    class="w-5 h-5 group-hover:scale-110 transition-transform"></i><span>ประวัติย้อนหลัง</span></a>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col min-w-0 h-full overflow-hidden relative">
        <header class="h-24 flex items-center justify-between px-8 lg:px-10 z-30">
            <div class="flex items-center gap-4">
                <button onclick="toggleSidebar()"
                    class="lg:hidden p-3 text-slate-500 bg-white/80 backdrop-blur-md rounded-2xl"><i data-lucide="menu"
                        class="w-6 h-6"></i></button>
                <div>
                    <h2 class="text-2xl font-bold text-slate-800">อุปกรณ์ LoRa</h2>
                    <p class="text-sm text-slate-500 font-medium">จัดการ Node และสถานะการเชื่อมต่อ</p>
                </div>
            </div>
            <button onclick="openAddDeviceModal()"
                class="flex items-center gap-2 bg-slate-900 hover:bg-indigo-600 text-white px-5 py-2.5 rounded-full font-bold shadow-lg transition-all hover:shadow-indigo-500/30 active:scale-95">
                <i data-lucide="plus-circle" class="w-4 h-4"></i> เพิ่มอุปกรณ์
            </button>
        </header>

        <div class="flex-1 overflow-auto px-6 lg:px-10 pb-10">

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                <div class="glass-panel p-6 rounded-[2rem] flex items-center gap-4 relative overflow-hidden">
                    <div class="absolute right-0 top-0 w-24 h-24 bg-emerald-100/50 rounded-full blur-2xl -mr-6 -mt-6">
                    </div>
                    <div class="w-12 h-12 rounded-2xl bg-emerald-100 flex items-center justify-center text-emerald-600">
                        <i data-lucide="wifi" class="w-6 h-6"></i></div>
                    <div>
                        <p class="text-sm font-bold text-emerald-600 uppercase">Online</p>
                        <h3 id="stat-online" class="text-2xl font-extrabold text-slate-800">...</h3>
                    </div>
                </div>
                <div class="glass-panel p-6 rounded-[2rem] flex items-center gap-4 relative overflow-hidden">
                    <div class="absolute right-0 top-0 w-24 h-24 bg-red-100/50 rounded-full blur-2xl -mr-6 -mt-6"></div>
                    <div class="w-12 h-12 rounded-2xl bg-red-100 flex items-center justify-center text-red-600"><i
                            data-lucide="wifi-off" class="w-6 h-6"></i></div>
                    <div>
                        <p class="text-sm font-bold text-red-600 uppercase">Offline</p>
                        <h3 id="stat-offline" class="text-2xl font-extrabold text-slate-800">...</h3>
                    </div>
                </div>
                <div class="glass-panel p-6 rounded-[2rem] flex items-center gap-4 relative overflow-hidden">
                    <div class="absolute right-0 top-0 w-24 h-24 bg-amber-100/50 rounded-full blur-2xl -mr-6 -mt-6">
                    </div>
                    <div class="w-12 h-12 rounded-2xl bg-amber-100 flex items-center justify-center text-amber-600"><i
                            data-lucide="battery-warning" class="w-6 h-6"></i></div>
                    <div>
                        <p class="text-sm font-bold text-amber-600 uppercase">Low Battery</p>
                        <h3 id="stat-lowbat" class="text-2xl font-extrabold text-slate-800">...</h3>
                    </div>
                </div>
            </div>

            <div class="glass-panel rounded-[2rem] overflow-hidden shadow-sm">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr
                            class="bg-white/50 border-b border-slate-100 text-slate-500 text-xs uppercase tracking-wider">
                            <th class="px-8 py-5 font-bold">Device ID</th>
                            <th class="px-6 py-5 font-bold">Status</th>
                            <th class="px-6 py-5 font-bold">Battery</th>
                            <th class="px-6 py-5 font-bold">เจ้าของ</th>
                            <th class="px-6 py-5 font-bold">ที่อยู่</th>
                            <th class="px-6 py-5 font-bold text-right">จัดการ</th>
                        </tr>
                    </thead>
                    <tbody id="deviceTableBody" class="divide-y divide-slate-100/50 text-slate-600 text-sm">
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="addDeviceModal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onclick="window.closeDeviceModal()"></div>
        <div
            class="relative bg-white rounded-[2rem] shadow-2xl w-full max-w-md overflow-hidden animate-in fade-in zoom-in-95 duration-200">
            <div class="px-8 py-6 border-b border-slate-100 flex items-center justify-between bg-slate-50/50">
                <h3 id="modalTitle" class="text-lg font-bold text-slate-800">เพิ่มอุปกรณ์</h3>
                <button class="text-slate-400 bg-white p-2 rounded-full" onclick="window.closeDeviceModal()"><i
                        data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            <div class="p-8 space-y-4">
                <input type="hidden" id="formMode" value="create">
                <div><label class="block text-sm font-bold text-slate-700 mb-2">Device ID</label><input type="text"
                        id="dId" placeholder="NODE-XXX"
                        class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl font-mono uppercase focus:ring-2 focus:ring-indigo-500/20 outline-none">
                </div>
                <div><label class="block text-sm font-bold text-slate-700 mb-2">จับคู่ลูกบ้าน</label><select id="dUser"
                        class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none">
                        <option value="">-- เลือก --</option>
                    </select></div>
            </div>
            <div class="px-8 py-6 bg-slate-50 flex justify-end gap-3 border-t border-slate-100">
                <button class="px-6 py-2.5 text-slate-600 hover:bg-slate-200 rounded-xl font-bold"
                    onclick="window.closeDeviceModal()">ยกเลิก</button>
                <button onclick="window.saveDevice()"
                    class="px-6 py-2.5 bg-indigo-600 text-white hover:bg-indigo-700 rounded-xl font-bold shadow-lg">บันทึก</button>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        lucide.createIcons();
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('-translate-x-full'); document.getElementById('mobile-overlay').classList.toggle('hidden'); }

        window.renderDevices = async function () {
            const tbody = document.getElementById('deviceTableBody');
            tbody.innerHTML = '<tr><td colspan="6" class="text-center py-10 text-slate-400">Loading...</td></tr>';
            try {
                const devRes = await fetch('api/devices.php');
                const devices = await devRes.json();

                // Fetch members for dropdown
                let members = [];
                try { if (typeof db !== 'undefined') members = await db.getMembers(); else { const r = await fetch('api/get_members.php'); members = await r.json(); } } catch (e) { }
                const select = document.getElementById('dUser');
                select.innerHTML = '<option value="">-- เลือกผู้ใช้งาน --</option>' + members.map(m => `<option value="${m.id}">${m.name}</option>`).join('');

                // Stats
                document.getElementById('stat-online').innerText = devices.filter(d => d.status === 'Online').length;
                document.getElementById('stat-offline').innerText = devices.filter(d => d.status === 'Offline').length;
                document.getElementById('stat-lowbat').innerText = devices.filter(d => d.battery < 20).length;

                if (devices.length === 0) { tbody.innerHTML = '<tr><td colspan="6" class="text-center py-10 text-slate-400">ไม่พบอุปกรณ์</td></tr>'; return; }

                tbody.innerHTML = devices.map(d => {
                    const isOnline = d.status === 'Online';
                    const batColor = d.battery > 60 ? 'bg-emerald-500' : (d.battery > 20 ? 'bg-amber-500' : 'bg-red-500');
                    const ownerName = d.owner_name ? d.owner_name : '<span class="text-slate-400 italic text-xs">ว่าง</span>';
                    const ownerAddr = d.owner_address ? d.owner_address : '-';

                    return `
                    <tr class="hover:bg-indigo-50/30 transition-colors group">
                        <td class="px-8 py-4 font-mono font-bold text-slate-700">${d.id}</td>
                        <td class="px-6 py-4">
                            <span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-bold border ${isOnline ? 'bg-emerald-50 text-emerald-600 border-emerald-100' : 'bg-red-50 text-red-600 border-red-100'}">
                                <span class="w-1.5 h-1.5 rounded-full ${isOnline ? 'bg-emerald-500' : 'bg-red-500'}"></span> ${d.status}
                            </span>
                        </td>
                        <td class="px-6 py-4">
                            <div class="flex items-center gap-2 w-32">
                                <div class="flex-1 h-2 bg-slate-100 rounded-full overflow-hidden"><div class="h-full ${batColor}" style="width: ${d.battery}%"></div></div>
                                <span class="text-xs font-bold text-slate-600">${d.battery}%</span>
                            </div>
                        </td>
                        <td class="px-6 py-4"><div class="flex items-center gap-2"><div class="w-6 h-6 rounded-full bg-slate-100 flex items-center justify-center text-[10px] font-bold text-slate-500">${ownerName.charAt(0)}</div><span>${ownerName}</span></div></td>
                        <td class="px-6 py-4 text-xs text-slate-500 truncate max-w-[150px]">${ownerAddr}</td>
                        <td class="px-6 py-4 text-right">
                            <button class="text-slate-400 hover:text-indigo-600 p-2 rounded-lg hover:bg-white transition-all" onclick="window.openEditDeviceModal('${d.id}', '${d.userId || ''}')"><i data-lucide="pencil" class="w-4 h-4"></i></button>
                            <button class="text-slate-400 hover:text-red-600 p-2 rounded-lg hover:bg-white transition-all" onclick="window.deleteDevice('${d.id}')"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                        </td>
                    </tr>`;
                }).join('');
                lucide.createIcons();
            } catch (e) { console.error(e); }
        }

        // Keep Modal Logic Same
        window.openAddDeviceModal = function () { document.getElementById('modalTitle').innerText = 'เพิ่มอุปกรณ์'; document.getElementById('formMode').value = 'create'; document.getElementById('dId').value = ''; document.getElementById('dId').disabled = false; document.getElementById('dUser').value = ''; document.getElementById('addDeviceModal').classList.remove('hidden'); }
        window.openEditDeviceModal = function (id, userId) { document.getElementById('modalTitle').innerText = 'แก้ไข'; document.getElementById('formMode').value = 'edit'; document.getElementById('dId').value = id; document.getElementById('dId').disabled = true; document.getElementById('dUser').value = userId; document.getElementById('addDeviceModal').classList.remove('hidden'); }
        window.closeDeviceModal = function () { document.getElementById('addDeviceModal').classList.add('hidden'); }
        window.saveDevice = async function () { /* Logic เดิม */ const id = document.getElementById('dId').value; const userId = document.getElementById('dUser').value; const mode = document.getElementById('formMode').value; if (!id) return; try { const method = mode === 'edit' ? 'PUT' : 'POST'; const res = await fetch('api/devices.php', { method: method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ id: id, userId: userId || null }) }); const r = await res.json(); if (r.status === 'success') { window.closeDeviceModal(); window.renderDevices(); } else { alert(r.message); } } catch (e) { alert(e); } }
        window.deleteDevice = async function (id) { if (confirm('ลบ?')) { await fetch('api/devices.php', { method: 'DELETE', body: JSON.stringify({ id: id }) }); window.renderDevices(); } }

        window.renderDevices();
        setInterval(renderDevices, 10000);
    </script>
</body>

</html>
