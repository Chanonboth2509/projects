<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Smart Community</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Sarabun:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Sarabun', 'Plus Jakarta Sans', sans-serif;
        }
    </style>
</head>

<body class="h-screen w-full bg-slate-900 relative flex items-center justify-center overflow-hidden">

    <div class="absolute inset-0 z-0">
        <div class="absolute top-[-10%] right-[-10%] w-[60%] h-[60%] bg-indigo-500/20 rounded-full blur-[100px]"></div>
        <div class="absolute bottom-[-10%] left-[-10%] w-[60%] h-[60%] bg-emerald-500/20 rounded-full blur-[100px]">
        </div>
        <div class="absolute inset-0 bg-[url('https://grainy-gradients.vercel.app/noise.svg')] opacity-20"></div>
    </div>

    <div class="relative z-10 w-full max-w-md p-6">
        <div class="bg-white/10 backdrop-blur-2xl border border-white/10 p-10 rounded-[2.5rem] shadow-2xl">
            <div class="text-center mb-8">
                <h1 class="text-2xl font-bold text-white">สร้างบัญชีผู้ดูแล</h1>
                <p class="text-slate-400 text-sm mt-1">สมัครสมาชิกเพื่อเข้าใช้งานระบบ</p>
            </div>

            <form action="index.html" class="space-y-4">
                <div class="relative">
                    <i data-lucide="user" class="absolute left-4 top-1/2 -translate-y-1/2 h-5 w-5 text-indigo-300"></i>
                    <input type="text"
                        class="w-full pl-12 pr-4 py-3.5 bg-slate-800/50 border border-slate-700/50 rounded-xl text-white outline-none focus:ring-2 focus:ring-indigo-500 transition-all placeholder:text-slate-500"
                        placeholder="ชื่อ-นามสกุล">
                </div>
                <div class="relative">
                    <i data-lucide="mail" class="absolute left-4 top-1/2 -translate-y-1/2 h-5 w-5 text-indigo-300"></i>
                    <input type="email"
                        class="w-full pl-12 pr-4 py-3.5 bg-slate-800/50 border border-slate-700/50 rounded-xl text-white outline-none focus:ring-2 focus:ring-indigo-500 transition-all placeholder:text-slate-500"
                        placeholder="อีเมล">
                </div>
                <div class="relative">
                    <i data-lucide="lock" class="absolute left-4 top-1/2 -translate-y-1/2 h-5 w-5 text-indigo-300"></i>
                    <input type="password"
                        class="w-full pl-12 pr-4 py-3.5 bg-slate-800/50 border border-slate-700/50 rounded-xl text-white outline-none focus:ring-2 focus:ring-indigo-500 transition-all placeholder:text-slate-500"
                        placeholder="รหัสผ่าน">
                </div>
                <div class="relative">
                    <i data-lucide="lock-check"
                        class="absolute left-4 top-1/2 -translate-y-1/2 h-5 w-5 text-indigo-300"></i>
                    <input type="password"
                        class="w-full pl-12 pr-4 py-3.5 bg-slate-800/50 border border-slate-700/50 rounded-xl text-white outline-none focus:ring-2 focus:ring-indigo-500 transition-all placeholder:text-slate-500"
                        placeholder="ยืนยันรหัสผ่าน">
                </div>

                <button type="submit"
                    class="w-full bg-emerald-500 hover:bg-emerald-400 text-white font-bold py-3.5 rounded-xl shadow-lg shadow-emerald-500/20 transform transition hover:-translate-y-1 mt-4">
                    สมัครสมาชิก
                </button>
            </form>

            <div class="mt-6 text-center">
                <a href="login.html" class="text-sm text-slate-400 hover:text-white transition-colors">มีบัญชีอยู่แล้ว?
                    เข้าสู่ระบบ</a>
            </div>
        </div>
    </div>
    <script>lucide.createIcons();</script>
</body>

</html>
