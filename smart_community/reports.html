<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports - LoRa Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Sarabun:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Sarabun', 'Plus Jakarta Sans', sans-serif;
            background-color: #f8fafc;
        }

        .glass-sidebar {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(255, 255, 255, 0.5);
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .mesh-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            background: radial-gradient(circle at 0% 0%, #e0e7ff 0%, transparent 50%), radial-gradient(circle at 100% 0%, #f0fdf4 0%, transparent 50%), radial-gradient(circle at 100% 100%, #fff1f2 0%, transparent 50%), radial-gradient(circle at 0% 100%, #fefce8 0%, transparent 50%);
            opacity: 0.6;
        }
    </style>
</head>

<body class="h-screen flex overflow-hidden text-slate-800">

    <div class="mesh-bg"></div>
    <div id="mobile-overlay"
        class="fixed inset-0 bg-slate-900/40 z-40 hidden backdrop-blur-sm lg:hidden transition-opacity"
        onclick="toggleSidebar()"></div>

    <aside id="sidebar"
        class="fixed lg:static inset-y-0 left-0 w-[280px] glass-sidebar z-50 transform -translate-x-full lg:translate-x-0 transition-transform duration-300 ease-in-out flex flex-col h-full lg:h-[96vh] lg:my-[2vh] lg:ml-[2vh] lg:rounded-3xl shadow-2xl lg:shadow-xl">
        <div class="h-24 flex items-center px-8">
            <div class="flex items-center gap-3">
                <div class="bg-gradient-to-br from-indigo-600 to-violet-600 p-3 rounded-2xl shadow-lg"><i
                        data-lucide="radio-receiver" class="text-white w-6 h-6"></i></div>
                <div>
                    <h1 class="text-xl font-extrabold text-slate-800 tracking-tight">LoRa Admin</h1>
                    <p class="text-[10px] font-semibold text-indigo-500 tracking-wider uppercase">Smart Village</p>
                </div>
            </div>
        </div>
        <nav class="flex-1 overflow-y-auto px-4 py-4 space-y-2">
            <p class="px-4 text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-2">Menu</p>
            <a href="index.html"
                class="flex items-center gap-3.5 px-4 py-3.5 rounded-2xl text-sm font-medium text-slate-500 hover:text-indigo-600 hover:bg-indigo-50/80 transition-all group"><i
                    data-lucide="layout-grid"
                    class="w-5 h-5 group-hover:scale-110 transition-transform"></i><span>ภาพรวมระบบ</span></a>
            <a href="members.html"
                class="flex items-center gap-3.5 px-4 py-3.5 rounded-2xl text-sm font-medium text-slate-500 hover:text-indigo-600 hover:bg-indigo-50/80 transition-all group"><i
                    data-lucide="users"
                    class="w-5 h-5 group-hover:scale-110 transition-transform"></i><span>รายชื่อลูกบ้าน</span></a>
            <a href="devices.html"
                class="flex items-center gap-3.5 px-4 py-3.5 rounded-2xl text-sm font-medium text-slate-500 hover:text-indigo-600 hover:bg-indigo-50/80 transition-all group"><i
                    data-lucide="cpu" class="w-5 h-5 group-hover:scale-110 transition-transform"></i><span>อุปกรณ์
                    LoRa</span></a>
            <p class="px-4 text-[11px] font-bold text-slate-400 uppercase tracking-widest mt-8 mb-2">System</p>
            <a href="notifications.html"
                class="flex items-center gap-3.5 px-4 py-3.5 rounded-2xl text-sm font-medium text-slate-500 hover:text-indigo-600 hover:bg-indigo-50/80 transition-all group"><i
                    data-lucide="bell-ring"
                    class="w-5 h-5 group-hover:scale-110 transition-transform"></i><span>แจ้งเตือน & SOS</span></a>
            <a href="reports.html"
                class="flex items-center gap-3.5 px-4 py-3.5 rounded-2xl text-sm font-semibold text-white bg-slate-900 shadow-lg shadow-slate-900/20 transition-all group relative overflow-hidden">
                <div
                    class="absolute inset-0 bg-gradient-to-r from-indigo-600 to-violet-600 opacity-0 group-hover:opacity-100 transition-opacity duration-300">
                </div>
                <i data-lucide="file-clock" class="w-5 h-5 relative z-10"></i><span
                    class="relative z-10">ประวัติย้อนหลัง</span>
                <div
                    class="ml-auto w-1.5 h-1.5 rounded-full bg-emerald-400 shadow-[0_0_8px_rgba(52,211,153,0.8)] relative z-10">
                </div>
            </a>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col min-w-0 h-full overflow-hidden relative">
        <header class="h-24 flex items-center justify-between px-8 lg:px-10 z-30">
            <div class="flex items-center gap-4">
                <button onclick="toggleSidebar()"
                    class="lg:hidden p-3 text-slate-500 bg-white/80 backdrop-blur-md rounded-2xl"><i data-lucide="menu"
                        class="w-6 h-6"></i></button>
                <div>
                    <h2 class="text-2xl font-bold text-slate-800">รายงานประวัติ</h2>
                    <p class="text-sm text-slate-500 font-medium">ข้อมูลเหตุการณ์ย้อนหลังทั้งหมด</p>
                </div>
            </div>
        </header>

        <div class="flex-1 overflow-auto px-6 lg:px-10 pb-10">
            <div class="glass-panel rounded-[2rem] overflow-hidden shadow-sm">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr
                            class="bg-white/50 border-b border-slate-100 text-slate-500 text-xs uppercase tracking-wider">
                            <th class="px-8 py-5 font-bold">วันที่/เวลา</th>
                            <th class="px-6 py-5 font-bold">ประเภท</th>
                            <th class="px-6 py-5 font-bold">ข้อความ</th>
                            <th class="px-6 py-5 font-bold">รายละเอียด</th>
                            <th class="px-6 py-5 font-bold text-right">สถานะ</th>
                        </tr>
                    </thead>
                    <tbody id="reportTableBody" class="divide-y divide-slate-100/50 text-slate-600 text-sm">
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        lucide.createIcons();
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('-translate-x-full'); document.getElementById('mobile-overlay').classList.toggle('hidden'); }

        async function loadReports() {
            const tbody = document.getElementById('reportTableBody');
            try {
                const response = await fetch('api/get_reports.php');
                const reports = await response.json();
                if (reports.length === 0) { tbody.innerHTML = '<tr><td colspan="5" class="text-center py-10 text-slate-400">ไม่มีข้อมูล</td></tr>'; return; }

                tbody.innerHTML = reports.map(item => {
                    let typeText = item.type || 'General';
                    let badgeClass = "bg-slate-100 text-slate-600";
                    let icon = "info";

                    if (typeText === 'SOS' || item.raw_msg.includes('ไฟไหม้')) {
                        badgeClass = "bg-red-50 text-red-600 border border-red-100";
                        icon = "siren";
                    } else if (typeText === 'Security' || item.raw_msg.includes('โจร')) {
                        badgeClass = "bg-amber-50 text-amber-600 border border-amber-100";
                        icon = "shield-alert";
                    }

                    return `
                    <tr class="hover:bg-slate-50 transition-colors">
                        <td class="px-8 py-4 font-mono text-slate-500 text-xs">${item.datetime}</td>
                        <td class="px-6 py-4">
                            <span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-[10px] font-bold ${badgeClass}">
                                <i data-lucide="${icon}" class="w-3 h-3"></i> ${typeText}
                            </span>
                        </td>
                        <td class="px-6 py-4 font-bold text-slate-700">${item.raw_msg}</td>
                        <td class="px-6 py-4 text-xs text-slate-500">${item.detail || '-'}</td>
                        <td class="px-6 py-4 text-right">
                            <span class="text-[10px] font-bold uppercase tracking-wider ${item.status === 'pending' ? 'text-red-500' : 'text-emerald-500'}">
                                ${item.status === 'pending' ? '● รอรับเรื่อง' : '● บันทึกแล้ว'}
                            </span>
                        </td>
                    </tr>`;
                }).join('');
                lucide.createIcons();
            } catch (e) { console.error(e); }
        }
        loadReports();
        setInterval(loadReports, 5000);
    </script>
</body>

</html>
